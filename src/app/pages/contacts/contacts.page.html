@if (bpSvc.isTablet()) {
  <app-welcome section="contacts"></app-welcome>
} @else {
  <ion-header>
    <ion-toolbar>
      <ion-title>{{ 'contacts.title' | translate }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
      <ion-refresher-content></ion-refresher-content>
    </ion-refresher>

    <app-sidebar-list></app-sidebar-list>
  </ion-content>
}
