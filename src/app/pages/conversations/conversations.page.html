@if (bpSvc.isTablet()) {
  <app-welcome section="conversations"></app-welcome>
} @else {
  <ion-header>
    <ion-toolbar>
      @if (sidebarList?.viewingArchived) {
        <ion-buttons slot="start">
          <ion-button (click)="sidebarList?.closeArchives()">
            <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      }

      <ion-title>
        {{ (sidebarList?.viewingArchived ? 'conversations.archives' : 'conversations.title') | translate }}
      </ion-title>

      @if (!sidebarList?.viewingArchived) {
        <ion-buttons slot="end">
          <ion-button (click)="sidebarList?.openArchives()" [attr.aria-label]="'conversations.archives' | translate">
            <ion-icon slot="icon-only" name="archive-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      }
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
      <ion-refresher-content></ion-refresher-content>
    </ion-refresher>

    <app-sidebar-list #sidebarList></app-sidebar-list>
  </ion-content>
}
