<ion-content class="pin-page-content">
  @if (!restoring) {
    <div class="pin-page">
      <div class="pin-page__hero">
        <ion-icon name="lock-closed-outline" class="pin-page__icon"></ion-icon>
        <h1 class="pin-page__title">{{ 'pin_unlock.card.title' | translate }}</h1>
        <p class="pin-page__subtitle">{{ 'pin_unlock.card.desc' | translate }}</p>
      </div>

      <div class="pin-page__form">
        <div class="form-field">
          <label class="form-field__label" for="pin-unlock-input">{{ 'pin_unlock.placeholder' | translate }}</label>
          <input
            id="pin-unlock-input"
            class="form-field__input"
            type="password"
            inputmode="numeric"
            autocomplete="current-password"
            maxlength="8"
            [value]="pin"
            (input)="pin = $any($event.target).value"
            [attr.aria-invalid]="error ? 'true' : null"
            [attr.aria-describedby]="error ? 'pin-unlock-error' : null"
          />
        </div>

        @if (error) {
          <p class="form-error" id="pin-unlock-error" role="alert">{{ error }}</p>
        }

        <button
          type="button"
          class="primary-btn"
          [disabled]="unlocking || !pin.trim()"
          (click)="onUnlock()">
          @if (unlocking) {
            <div class="spinner spinner--sm"></div>
          } @else {
            {{ 'pin_unlock.submit' | translate }}
          }
        </button>

        <button type="button" class="text-btn" (click)="goToRecovery()">
          {{ 'pin_unlock.forgot' | translate }}
        </button>
      </div>
    </div>
  }

  @if (restoring) {
    <div class="pin-page pin-page--centered">
      <div class="spinner"></div>
      <p class="pin-page__status">{{ 'pin_unlock.restoring' | translate }}</p>
      @if (restored > 0) {
        <p class="pin-page__status">{{ 'pin_unlock.restored' | translate: { count: restored } }}</p>
      }
    </div>
  }
</ion-content>
