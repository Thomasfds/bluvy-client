<div class="ss-header">
  <button class="ss-back" (click)="goBack()" [attr.aria-label]="'common.back' | translate">
    <ion-icon name="chevron-back-outline"></ion-icon>
  </button>
  <h1>{{ 'menu.privacy' | translate }}</h1>
</div>

<ion-content>
  <div class="ss-content">

    <div class="ss-section">
      <div class="ss-section-title">{{ 'security.section.privacy' | translate }}</div>
      <div class="ss-block">
        <div class="settings-row">
          <div class="settings-row__body">
            <span class="settings-row__label">{{ 'security.privacy.presence' | translate }}</span>
            <span class="settings-row__sub">{{ 'security.privacy.presence.sub' | translate }}</span>
          </div>
          <ion-toggle [checked]="presenceStatusEnabled()" (ionChange)="togglePresence($event)" slot="end"></ion-toggle>
        </div>

        <div class="settings-row">
          <div class="settings-row__body">
            <span class="settings-row__label">{{ 'security.privacy.typing' | translate }}</span>
            <span class="settings-row__sub">{{ 'security.privacy.typing.sub' | translate }}</span>
          </div>
          <ion-toggle [checked]="typingIndicatorEnabled()" (ionChange)="toggleTyping($event)" slot="end"></ion-toggle>
        </div>
      </div>
    </div>

  </div>
</ion-content>
