<ion-content class="pin-page-content">
  @if (step === 'key') {
    <div class="pin-page">
      <div class="pin-page__hero">
        <ion-icon name="key-outline" class="pin-page__icon"></ion-icon>
        <h1 class="pin-page__title">{{ 'recovery_unlock.key.title' | translate }}</h1>
        <p class="pin-page__subtitle">{{ 'recovery_unlock.key.desc' | translate }}</p>
      </div>

      <div class="pin-page__form">
        <div class="form-field">
          <label class="form-field__label" for="recovery-key-input">{{ 'recovery_unlock.key.placeholder' | translate }}</label>
          <input
            id="recovery-key-input"
            class="form-field__input"
            type="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
            [value]="recoveryInput"
            (input)="recoveryInput = $any($event.target).value"
            [attr.aria-invalid]="error ? 'true' : null"
            [attr.aria-describedby]="error ? 'recovery-key-error' : null"
          />
        </div>

        @if (error) {
          <p class="form-error" id="recovery-key-error" role="alert">{{ error }}</p>
        }

        <button
          type="button"
          class="primary-btn"
          [disabled]="working || !recoveryInput.trim()"
          (click)="onUnlockWithRecovery()">
          @if (working) {
            <div class="spinner spinner--sm"></div>
          } @else {
            {{ 'recovery_unlock.key.submit' | translate }}
          }
        </button>
      </div>
    </div>
  }

  @if (step === 'pin') {
    <div class="pin-page">
      <div class="pin-page__hero">
        <ion-icon name="lock-closed-outline" class="pin-page__icon"></ion-icon>
        <h1 class="pin-page__title">{{ 'recovery_unlock.pin.title' | translate }}</h1>
        <p class="pin-page__subtitle">{{ 'recovery_unlock.pin.desc' | translate }}</p>
      </div>

      <div class="pin-page__form">
        <div class="form-field">
          <label class="form-field__label" for="recovery-pin-input">{{ 'recovery_unlock.pin.new' | translate }}</label>
          <input
            id="recovery-pin-input"
            class="form-field__input"
            type="password"
            inputmode="numeric"
            autocomplete="new-password"
            maxlength="8"
            [value]="pin"
            (input)="pin = $any($event.target).value"
            [attr.aria-invalid]="error ? 'true' : null"
            [attr.aria-describedby]="error ? 'recovery-pin-error' : null"
          />
        </div>

        <div class="form-field">
          <label class="form-field__label" for="recovery-pin-confirm-input">{{ 'recovery_unlock.pin.confirm' | translate }}</label>
          <input
            id="recovery-pin-confirm-input"
            class="form-field__input"
            type="password"
            inputmode="numeric"
            autocomplete="new-password"
            maxlength="8"
            [value]="pinConfirm"
            (input)="pinConfirm = $any($event.target).value"
            [attr.aria-invalid]="error ? 'true' : null"
            [attr.aria-describedby]="error ? 'recovery-pin-error' : null"
          />
        </div>

        @if (error) {
          <p class="form-error" id="recovery-pin-error" role="alert">{{ error }}</p>
        }

        <button
          type="button"
          class="primary-btn"
          [disabled]="working || !pin || !pinConfirm"
          (click)="onSetNewPin()">
          @if (working) {
            <div class="spinner spinner--sm"></div>
          } @else {
            {{ 'recovery_unlock.pin.submit' | translate }}
          }
        </button>

        <button type="button" class="text-btn" (click)="onSkipPin()">
          {{ 'recovery_unlock.pin.skip' | translate }}
        </button>
      </div>
    </div>
  }
</ion-content>
