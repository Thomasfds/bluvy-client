<div class="ss-header">
  <button class="ss-back" (click)="goBack()" [attr.aria-label]="'common.back' | translate">
    <ion-icon name="chevron-back-outline"></ion-icon>
  </button>
  <h1>{{ 'settings.language' | translate }}</h1>
</div>

<ion-content class="ion-padding">
  <div class="ss-content">
    <p class="lang-label">{{ 'settings.language.label' | translate }}</p>

    <div class="theme-segments">
      <button
        class="segment-btn"
        [class.segment-btn--active]="i18n.locale === 'fr'"
        (click)="setLocale('fr')"
      >
        Français
      </button>
      <button
        class="segment-btn"
        [class.segment-btn--active]="i18n.locale === 'en'"
        (click)="setLocale('en')"
      >
        English
      </button>
    </div>
  </div>
</ion-content>
