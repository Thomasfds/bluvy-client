<div class="app-shell">

  @if (bpSvc.isTablet()) {
    <aside class="sidebar">

      <!-- Profile -->
      <button type="button" class="sidebar-profile" (click)="navigate(routes.menu)">
        <app-avatar
          [src]="auth.currentUser()?.avatarUrl ?? null"
          [handle]="auth.currentUser()?.handle || ''"
          size="md"
        ></app-avatar>
        <div class="sidebar-profile__info">
          <span class="sidebar-profile__name">
            {{ auth.currentUser()?.displayName || auth.currentUser()?.handle }}
          </span>
          <span class="sidebar-profile__handle">&#64;{{ auth.currentUser()?.handle }}</span>
        </div>
      </button>

      <!-- Main nav -->
      <nav class="sidebar-nav">
        <button
          class="sidebar-item"
          [class.sidebar-item--active]="isActive(routes.conversations)"
          (click)="navigate(routes.conversations)"
        >
          <ion-icon name="chatbubble-outline" class="sidebar-item__icon"></ion-icon>
          <span class="sidebar-item__label">{{ 'tabs.conversations' | translate }}</span>
          @if (receiptsSvc.totalUnread$ | async; as total) {
            @if (total > 0) {
              <span class="sidebar-badge">{{ total > 99 ? '99+' : total }}</span>
            }
          }
        </button>

        <button
          class="sidebar-item"
          [class.sidebar-item--active]="isActive(routes.contacts)"
          (click)="navigate(routes.contacts)"
        >
          <ion-icon name="people-outline" class="sidebar-item__icon"></ion-icon>
          <span class="sidebar-item__label">{{ 'tabs.contacts' | translate }}</span>
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- Settings nav -->
      <nav class="sidebar-nav">
        <button
          class="sidebar-item"
          [class.sidebar-item--active]="isSecurityActive()"
          (click)="navigate(routes.security)"
        >
          <ion-icon name="shield-checkmark-outline" class="sidebar-item__icon"></ion-icon>
          <span class="sidebar-item__label">{{ 'tabs.security' | translate }}</span>
        </button>

        <button
          class="sidebar-item"
          [class.sidebar-item--active]="isActive(routes.settings)"
          (click)="navigate(routes.settings)"
        >
          <ion-icon name="settings-outline" class="sidebar-item__icon"></ion-icon>
          <span class="sidebar-item__label">{{ 'tabs.settings' | translate }}</span>
        </button>

        <button
          class="sidebar-item"
          [class.sidebar-item--active]="isActive(routes.about)"
          (click)="navigate(routes.about)"
        >
          <ion-icon name="information-circle-outline" class="sidebar-item__icon"></ion-icon>
          <span class="sidebar-item__label">{{ 'tabs.about' | translate }}</span>
        </button>
      </nav>

      <!-- Beta notice -->
      <div class="sidebar-beta">
        <ion-icon name="flask-outline"></ion-icon>
        <span class="sidebar-beta__label">{{ 'tabs.beta' | translate }}</span>
      </div>

      <!-- Logout pinned at bottom -->
      <div class="sidebar-footer">
        <button class="sidebar-item sidebar-item--danger" (click)="auth.logout()">
          <ion-icon name="log-out-outline" class="sidebar-item__icon"></ion-icon>
          <span class="sidebar-item__label">{{ 'tabs.logout' | translate }}</span>
        </button>
      </div>

    </aside>

    <div class="sidebar-list">
      <app-sidebar-list></app-sidebar-list>
    </div>
  }

  <div class="app-main">
    @if (!bpSvc.isTablet()) {
      <div class="app-beta-bar">
        <ion-icon name="flask-outline"></ion-icon>
        <span>{{ 'tabs.beta' | translate }}</span>
      </div>
    }
    <ion-tabs>
      <ion-tab-bar slot="bottom" [class.tab-bar--hidden]="!showTabBar()">
        <ion-tab-button tab="conversations" [href]="routes.conversations">
          <ion-icon [name]="isActive(routes.conversations) ? 'chatbubble' : 'chatbubble-outline'"></ion-icon>
          <span class="tab-label">{{ 'tabs.conversations' | translate }}</span>
          @if (receiptsSvc.totalUnread$ | async; as total) {
            @if (total > 0) {
              <app-unread-badge [count]="total"></app-unread-badge>
            }
          }
        </ion-tab-button>

        <ion-tab-button tab="contacts" [href]="routes.contacts">
          <ion-icon [name]="isActive(routes.contacts) ? 'people' : 'people-outline'"></ion-icon>
          <span class="tab-label">{{ 'tabs.contacts' | translate }}</span>
        </ion-tab-button>

        <ion-tab-button tab="menu" [href]="routes.menu">
          <ion-icon [name]="isActive(routes.menu) ? 'menu' : 'menu-outline'"></ion-icon>
          <span class="tab-label">{{ 'tabs.menu' | translate }}</span>
        </ion-tab-button>
      </ion-tab-bar>
    </ion-tabs>
  </div>

</div>
